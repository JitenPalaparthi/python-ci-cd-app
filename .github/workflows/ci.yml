name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  test-lint-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run Mypy
        run: mypy app tests

      # - name: Run Pytest
      #   run: pytest -q
